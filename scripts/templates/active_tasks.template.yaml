# 活跃任务状态追踪
# 用于跨会话任务状态持久化
# 由你的 AI CEO 在每次会话结束时更新
# 版本: 1.0

version: "1.0"

# 任务状态定义
# - pending: 待处理
# - in_progress: 执行中
# - blocked: 阻塞（等待决策/依赖）
# - review: 审查中
# - completed: 已完成
# - cancelled: 已取消

# 活跃任务列表（初始为空）
active_tasks: []

# 示例任务（取消注释即可使用）:
# - id: "TASK-2026-0101-001"
#   title: "示例任务标题"
#   level: "M"                      # S/M/L 任务级别
#   status: "in_progress"
#   current_chain_step: "②执行中"   # 当前执行链环节
#   assigned_teams:
#     - harness_ops
#   decision_level: "L2"            # 决策级别 L1-L4
#   created_at: "2026-01-01"
#   updated_at: "2026-01-01"
#   context: "任务背景说明"
#   blockers: []
#   deliverables:
#     - "交付物描述"
#   next_steps:
#     - "下一步行动"

# 已完成任务归档（保留最近20条）
completed_tasks: []

# 跨会话恢复提示
# 新会话开始时，你的 AI CEO 应读取此文件，恢复上下文
resume_instructions: |
  1. 读取 active_tasks 列表
  2. 对每个 in_progress 或 blocked 的任务：
     - 恢复任务上下文
     - 确认当前执行链环节
     - 继续从断点执行
  3. 向你简要汇报恢复状态（仅当有进行中任务时）
