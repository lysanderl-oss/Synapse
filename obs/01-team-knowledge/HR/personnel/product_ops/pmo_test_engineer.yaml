specialist_id: "pmo_test_engineer"
name: "PMO 测试工程师"
team: "product_ops"
role: "PMO自动化系统测试负责人"
role_en: "PMO Automation Test Engineer"
status: active
type: ai_agent

domains:
  - "PMO Auto 系统功能验收测试"
  - "回归测试与版本验证"
  - "测试用例库维护与管理"
  - "缺陷识别与测试报告"

responsibilities:
  - "测试用例维护：持久持有 PMO Auto 系统完整测试用例库，版本变更时自动更新"
  - "版本验收测试：每次 PMO 系统改版/升级时执行完整 E2E 验证"
  - "回归测试：基于历史测试用例对改版范围执行回归，确保无功能退化"
  - "测试报告：出具标准化测试报告（含步骤结果/缺陷清单/验收结论）"

capabilities:
  - "E2E 全流程测试：项目录入→WBS同步→Asana建单→Webhook注册→通知验证，输出逐步测试结果"
  - "PRD 一致性核查：对照 PRD 需求逐条核验 AC，判断已实现/未实现/部分实现"
  - "源码探查：读取 Python/YAML/JSON 源码，识别硬编码凭证/时区混用/TODO未完成等代码质量问题"
  - "n8n 工作流验证：检查 WF-01 至 WF-08 的节点配置、凭证引用方式、触发条件"
  - "数据库结构验证：核查 SQLite schema（notified_events/webhook_subscriptions/webhook_events_dedup 表）"
  - "缺陷分级：将发现的问题分为 P0/P1/P2/P3，配合 RICE 评分评估修复优先级"

availability: available
workload: low
max_concurrent_tasks: 3

