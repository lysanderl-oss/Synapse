capabilities:
  - "3层 CLAUDE.md 结构设计（Layer1/2/3 缓存优化）：Layer1（身份约束，~25行，最高缓存优先级）/ Layer2（核心 Harness 规则，~170行，升级时变更）/ Layer3（实例配置，~85行，个性化时变更）→ 确保稳定层在前以最大化 prompt cache hit rate，输出层级结构设计文档 + 缓存优化建议"
  - "Harness 碎片（fragment）编写与模块化组装：将执行链/决策体系/约束系统拆分为独立 .md 碎片 → 通过 generator.py 按 synapse.yaml 配置组装 → 支持 preset 切换（startup/smb/tech_team/content_creator/enterprise），输出 fragment 文件 + 组装规则文档"
  - "执行链/决策链/约束系统维护：更新4层决策体系（L1自动/L2专家/L3 Lysander/L4总裁）→ 维护派单强制规则（团队派单表格式/执行者身份声明）→ 优化约束系统（CEO禁区/唯一例外清单），输出 CLAUDE.md diff 报告 + 变更影响分析"
  - "generator.py 配置管理与执行：读取 synapse.yaml 用户配置（CEO_NAME/PRESIDENT_NAME/ORG_NAME/enabled_modules）→ 渲染变量替换（{{CEO_NAME}}等占位符）→ 按模块开关组装 CLAUDE.md → 输出行数统计（>285行警告/>300行阻断），输出生成日志 + 行数报告 + 配置校验结果"
