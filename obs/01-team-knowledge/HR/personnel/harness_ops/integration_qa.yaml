  yaml_validation: 5     # YAML语法验证能力，核心专职
  test_design: 4         # 测试设计能力
  impact_analysis: 4     # 变更影响分析能力
  regression_testing: 4  # 回归测试能力
  documentation: 3       # 文档编写能力
  task_execution: 5     # 任务执行能力，最高
