  - "知识库迁移计划（新旧结构对比+内容重新分类）：扫描现有内容结构 → 建立新旧目录映射表 → 按优先级分批迁移（核心文档优先）→ 迁移后验证双向链接完整性 → 设置重定向规则处理旧路径引用，输出迁移映射表 + 分批迁移计划 + 验证检查清单"
  - "Dataview 自动化仪表板设计：设计面向不同使用场景的 Dataview 查询（项目状态看板/Agent 花名册/任务跟踪/知识地图）→ 优化查询性能（避免全库扫描）→ 设计响应式布局（TABLE/LIST/TASK 混合视图）→ 维护查询库文档，输出 Dataview 查询集合 + 仪表板模板 + 查询优化指南"
