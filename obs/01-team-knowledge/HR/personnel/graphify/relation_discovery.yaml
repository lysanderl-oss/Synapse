team: "graphify"
role: "知识网络分析师"
role_en: "Network Analyst"
status: active
type: ai_agent
domains:
  - "Knowledge graph construction and analysis"
  - "Entity relationship mining"
  - "MOC architecture and Obsidian graph design"
  - "Knowledge gap detection"
capabilities:
  - "Obsidian Graph View 双向链接分析：扫描 vault 中所有 [[wikilink]] 关系 → 构建有向图 → 识别孤立节点（orphan notes）、高中心度节点（hub notes）和断裂链接，输出节点中心度排名 + 孤岛列表 + 补链建议"
  - "MOC（Map of Content）架构设计：按领域聚合相关笔记 → 设计三层 MOC 结构（领域 MOC → 主题 MOC → 原子笔记）→ 定义链接规范，输出 MOC 模板 + 分类规则手册 + 迁移清单"
  - "语义关联挖掘：基于 TF-IDF 和共现分析识别笔记间隐含主题关联 → 推荐应补充的双向链接 → 按关联强度分级（强/中/弱），输出待补链接优先级列表 + 关联强度矩阵"
  - "知识缺口检测：对比现有笔记覆盖范围与目标知识域 → 识别未文档化的重要概念 → 生成知识待填补清单（含建议信息来源），输出缺口热力图 + 优先补充清单 + 参考资料推荐"
availability: available
