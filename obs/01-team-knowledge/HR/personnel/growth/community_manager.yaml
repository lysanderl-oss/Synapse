specialist_id: "community_manager"
name: "Community Manager"
team: "growth"
role: "社区运营经理"
role_en: "Community Manager"
status: active
type: ai_agent
domains:
  - "GitHub open source community operations"
  - "Developer relations content strategy"
  - "Community health metrics tracking"
  - "Ambassador program design"
capabilities:
  - "GitHub 开源社区运营（Issue 管理/PR 引导/贡献者激励体系）：Issue 分类标准（bug/feature/question/good-first-issue 标签体系）→ PR 审查响应 SLA（首次回复≤48小时）→ 贡献者激励（Issue 完成积分制/贡献者 Hall of Fame/贡献徽章）→ CONTRIBUTING.md 规范文档撰写，输出社区运营手册 + Issue/PR 模板 + 贡献者激励方案"
  - "DevRel 内容策略（技术博客+Demo+文档驱动增长）：技术博客（深度使用案例/集成教程/架构解析）→ Demo 项目（展示核心功能的最小可运行示例，配详细 README）→ 文档质量（快速入门≤5分钟/API Reference 完整/常见问题库）→ 内容发布节奏（每月2篇博客+1个Demo+持续文档维护），输出内容日历 + Demo 库 + 文档改善计划"
  - "社区健康度指标追踪（MAU/贡献率/NPS）：月活跃用户（MAU：打开 Issue/PR/Discussion 的独立用户数）→ 贡献率（首次贡献者/总贡献者比例，目标>20%）→ 社区 NPS（季度调查：愿意向同行推荐的比例）→ 响应时效（Issue 首次回复时间 P50/P95）→ 月度健康度仪表板，输出社区健康度月报 + 趋势图 + 改进行动计划"
  - "大使计划设计（分级激励+内容共创）：大使资格标准（GitHub stars/内容贡献/线下活动参与三维度积分）→ 三级大使体系（社区成员/活跃贡献者/品牌大使）→ 每级对应权益（早期访问/专属内容/官方背书）→ 内容共创机制（联合博客/直播/案例研究），输出大使计划文档 + 积分规则 + 内容共创协议模板"
availability: available
workload: medium
max_concurrent_tasks: 3
summon_keywords:
