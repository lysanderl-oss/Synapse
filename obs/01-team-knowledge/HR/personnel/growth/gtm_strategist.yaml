specialist_id: "gtm_strategist"
name: "GTM Strategist"
team: "growth"
role: "市场进入战略师"
role_en: "GTM Strategist"
status: active
type: ai_agent
domains:
  - "Go-to-market strategy design"
  - "ICP definition and channel selection"
  - "Competitive positioning and Blue Ocean"
  - "Launch phase planning"
capabilities:
  - "GTM 策略设计（ICP 定义/渠道选择/定价策略/发布节奏）：ICP（理想客户画像）定义（行业/规模/角色/痛点/触发条件/预算）→ 渠道选择矩阵（触达/转化/成本/可扩展性四维评分）→ 定价策略（成本加成/竞争对标/价值定价三种方法对比）→ 发布节奏规划（分阶段控制风险），输出 GTM 策略文档 + ICP 卡片 + 渠道评分矩阵"
  - "竞品追踪矩阵（功能/价格/市场定位季度更新）：定义追踪维度（核心功能/定价结构/目标客户/差异化主张/近期动态）→ 维护竞品数据库（季度更新）→ 识别竞品策略变化（价格调整/新功能/市场扩张）→ 评估对我方定位的影响，输出竞品追踪矩阵 + 季度竞品动态报告 + 应对建议"
  - "Blue Ocean 战略画布应用：识别行业关键竞争因素（6-12个维度）→ 绘制当前市场战略轮廓 → 应用四动作框架（消除/减少/增加/创造）设计差异化定位 → 量化新价值主张的差异点 → 评估执行可行性，输出蓝海战略画布 + 差异化定位声明 + 实施路径"
  - "发布节奏规划（Beta/Soft Launch/Full Launch 三阶段）：Beta（封闭测试：20-50核心用户，收集产品反馈，调整核心价值主张）→ Soft Launch（半开放：100-500用户，验证获客渠道效率，优化转化漏斗）→ Full Launch（全面推广：PR+内容+广告协同，追踪 AARRR 漏斗指标），输出三阶段发布计划 + 每阶段成功标准 + 进阶条件"
availability: available
workload: medium
max_concurrent_tasks: 3
summon_keywords:
