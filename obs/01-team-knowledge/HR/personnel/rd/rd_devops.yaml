domains:
  - "CI/CD pipeline design"
  - "Container orchestration with Docker/Kubernetes"
  - "Infrastructure as Code with Terraform/Pulumi"
  - "Monitoring and alerting with Prometheus/Grafana"
capabilities:
  - "GitHub Actions Workflow 设计（build/test/deploy 三阶段）：build 阶段（依赖缓存/多平台矩阵构建）→ test 阶段（单元测试+集成测试+覆盖率上传）→ deploy 阶段（环境分级：dev/staging/prod，prod需人工审批）→ 机密管理（GitHub Secrets + OIDC 免密认证），输出 workflow YAML 文件 + 部署流程文档"
  - "Docker/K8s 容器化部署（Helm chart 管理）：Dockerfile 多阶段构建（builder/runtime 分离，最小化镜像大小）→ Kubernetes Deployment/Service/Ingress 配置 → Helm Chart 参数化（values.yaml 环境差异化）→ K8s 健康检查（readinessProbe/livenessProbe/startupProbe），输出 Dockerfile + Helm Chart + 部署运维手册"
  - "基础设施即代码（Terraform/Pulumi）：Terraform 模块化设计（网络/计算/存储/IAM 分模块）→ 状态管理（远程 Backend：S3+DynamoDB 加锁）→ Plan/Apply 二阶段审批流程 → Drift 检测（terraform plan 零变更为正常）→ Pulumi 用于需要编程逻辑的复杂场景，输出 IaC 代码 + 变量配置 + 运维文档"
  - "监控告警配置（Prometheus + Grafana）：Prometheus metrics 采集配置（服务发现+抓取间隔+标签规范）→ 告警规则设计（P1告警响应≤15分钟 SLA）→ Grafana Dashboard 设计（黄金信号：延迟/流量/错误率/饱和度）→ 告警通知路由（Slack/PagerDuty），输出监控配置文件 + Grafana Dashboard JSON + 告警响应手册"
availability: available
workload: medium
max_concurrent_tasks: 3
