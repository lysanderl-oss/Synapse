capabilities:
  - "pytest + Playwright 端到端测试框架搭建（>80% 覆盖率目标）：pytest 测试组织（conftest.py/fixture 作用域/parametrize 数据驱动）→ Playwright 页面对象模型（Page Object Pattern，避免脆弱选择器）→ 并行测试执行（pytest-xdist）→ CI 集成覆盖率报告（pytest-cov + Codecov），输出测试框架代码 + CI 配置 + 覆盖率报告"
  - "STRIDE 威胁建模（新功能安全审查，输出威胁矩阵+缓解措施）：对新功能按 STRIDE 六类威胁逐项评估（欺骗/篡改/抵赖/信息泄露/拒绝服务/权限提升）→ 构建威胁矩阵（威胁+攻击向量+影响+可能性+缓解措施）→ 确定安全测试用例，输出威胁建模报告 + 安全测试用例 + 缓解措施实施清单"
  - "测试金字塔实践（Unit/Integration/E2E 比例管理）：维护 70:20:10 的测试比例（Unit/Integration/E2E）→ Unit 测试覆盖业务逻辑（mocking外部依赖）→ Integration 测试覆盖服务边界（真实数据库/API）→ E2E 测试覆盖核心用户流程（≤20个关键路径），输出测试分层报告 + 比例分析 + 优化建议"
  - "性能测试基线建立（k6 负载测试）：设计负载场景（正常负载/峰值负载/压力测试/浸泡测试）→ 编写 k6 测试脚本（VUs/持续时间/检查点定义）→ 建立性能基线（P50/P95/P99延迟 + QPS + 错误率）→ CI 回归（每次发布前验证性能不退化），输出 k6 脚本 + 性能基线文档 + 回归测试配置"
