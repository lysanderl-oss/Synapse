# ============================================================
# 自动化管线配置（Plan B 周度全自动，2026-04-27 总裁批准）
# ============================================================
automation_pipeline:
  approved_by: 总裁刘子杨
  approved_at: "2026-04-27"
  cadence: weekly

  # 每周日 20:00 Dubai (UTC 16:00) GitHub Actions 触发
  weekly_sync:
    trigger: "GitHub Actions hub-weekly-sync.yml"
    schedule: "0 16 * * 0"  # 每周日 UTC 16:00 = Dubai 20:00
    workflow_file: ".github/workflows/hub-weekly-sync.yml"
    steps:
      - step: 1
        script: "scripts/asset_counter.py"
        purpose: "更新 logs/asset_snapshot.yaml"
      - step: 2
        script: "scripts/diff-to-notion.py"
        purpose: "对比快照 vs 上次同步状态，自动更新 Notion 资产全景"
        state_file: "logs/hub-sync-state.yaml"
      - step: 3
        script: "scripts/hub-health-check.py"
        purpose: "全面健康检查 + Slack 周报"
        output: "logs/hub-health-{date}.md"

  # 里程碑触发规则（OBJ completed 时 Lysander 执行）
  milestone_trigger:
    trigger_condition: "OBJ status → completed"
    executor: "Lysander 主对话"
    checklist:
      - "新 PDF/报告产出？→ 上传到 可下载文档 + 更新 成果物 Dashboard"
      - "Agent 数量变化？→ 触发 diff-to-notion.py"
      - "新产品线上线？→ 更新 产品线详情"

  # 内容价值过滤器
  content_filter:
    include:
      - "可向外展示的成果物（PDF/报告/提案）"
      - "体系级里程碑（VERSION bump / OBJ shipped）"
      - "总裁批准的新产品线或战略方向"
      - "资产数量变化超过5个"
    exclude:
      - "过程调试文件、临时脚本"
      - "内部技术决策文档（归 OBS/decision-log）"
      - "每日例行工作日志（工作日志 DB 层处理）"
