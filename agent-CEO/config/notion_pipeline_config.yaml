# ============================================================
# 内容增加规范（产品视角）
# ============================================================
content_addition_protocol:

  before_any_operation:
    - step: 读取此文件，了解 Hub 当前结构
    - step: 确认目标页面的正确 ID（从 known_pages 查找）
    - step: 明确新内容放置的页面层级（parent page）
    - step: 评估是否需要新建页面还是在现有页面追加
    - step: 如涉及附件，确认使用 approved_methods 中的方案

  after_any_operation:
    - step: 更新 known_pages（如有新建页面，添加到列表）
    - step: 更新 change_log（记录本次操作内容）
    - step: 验证操作结果（API 返回 URL 或读取页面确认）

  content_placement_rules:
    claude_code_theme:
      parent: "Claude Code 工作台页面（待创建）"
      sub_categories:
        成果物: "成果物 Dashboard 子页面"
        工作日志: "工作日志数据库（已有，通过 daily sync 自动写入）"
        知识沉淀: "Claude Code 工作台 → 知识沉淀子页面"

    recurring_reports:
      destination: "工作日志数据库"
      method: "notion_daily_sync.py 自动写入，非手动"

    milestone_documents:
      destination: "Claude Code 工作台 → 成果物 Dashboard"
      method: "notion_architect 规划 → notion_content_ops 执行"

# ============================================================
# 附件与文件下载策略
# ============================================================
file_strategy:

  api_limitation: |
    [更新 2026-04-27] Notion File Upload API 已验证可用。
    正确端点：POST /v1/file_uploads（下划线，非连字符）。
    流程：1) POST /v1/file_uploads → 获取 upload_id + upload_url（/send 端点）
          2) POST upload_url（multipart/form-data）→ 上传实际文件内容
          3) 在 Notion block 中用 file_upload_id 引用文件
    注意：upload 有效期 1 小时（expiry_time）

  file_upload_api:
    endpoint: "POST https://api.notion.com/v1/file_uploads"
    verified_date: "2026-04-27"
    status: "available"
    send_endpoint: "POST https://api.notion.com/v1/file_uploads/{id}/send"
    headers_required:
      - "Authorization: Bearer {NOTION_TOKEN}"
      - "Notion-Version: 2022-06-28"
      - "Content-Type: application/json"
    request_body: '{"filename": "xxx.pdf", "content_type": "application/pdf"}'
    response_fields:
      - id: "file upload UUID"
      - upload_url: "send endpoint URL"
      - status: "pending → uploaded"
      - expiry_time: "1 hour from creation"

  approved_methods:
    method_1:
      name: "Notion File Upload API（首选）"
      how: "POST /v1/file_uploads 创建会话 → multipart POST upload_url/send 上传文件"
      result: "Notion 原生附件，真实文件存储，无需公开 URL"
      prerequisite: "NOTION_TOKEN 有效，文件在本地路径可访问"
      priority: 1

    method_2:
      name: "GitHub Raw URL + Notion Bookmark/File Block"
      how: "将文件 git push 到公开仓库，用 raw URL 在 Notion 中创建 bookmark 或 file block"
      result: "真实可点击下载链接"
      prerequisite: "文件必须在 GitHub 公开仓库中"
      priority: 2

    method_3:
      name: "Notion PDF Embed Block（外部 URL）"
      how: "先获取文件的公开 URL，用 API 创建 type=pdf 的 embed block"
      result: "Notion 内嵌 PDF 预览 + 下载按钮"
      api_format: |
        {
          "type": "pdf",
          "pdf": {
            "type": "external",
            "external": {"url": "https://...公开URL..."}
          }
        }
      priority: 3

    method_4:
      name: "手动上传（Notion UI）"
      how: "总裁或操作者在 Notion 界面手动拖拽上传文件"
      result: "Notion 原生附件，最稳定"
      note: "兜底方案，仅在前三种均不可行时使用"
      priority: 4

  forbidden:
    - "在文字中写'点击下载'但没有真实 URL"
    - "把本地文件路径当下载链接"
    - "用 API 创建假的 file block（没有真实 URL）"

