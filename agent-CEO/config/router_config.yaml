# Synapse v3.0 — Capability Router 参数配置
# Phase 2 T2-2: Agent Capability Router
#
# 路由算法权重与阈值配置
# 与 capability_router.py 的 DEFAULT_CONFIG 保持同步

# ─── 评分权重 ────────────────────────────────────────────────────────────────
# final_score = cosine * cosine_similarity + coverage * coverage + quality_bonus + completion_bonus
# 其中 quality_bonus = (avg_quality_score - 3.5) * quality_bonus_range
#       completion_bonus = (avg_completion_rate - 0.9) * completion_bonus_range

weights:
  # 余弦相似度权重（核心向量匹配）
  cosine_similarity: 0.40

  # 任务技能覆盖率权重
  coverage: 0.30

  # 质量评分附加分系数
  # 例: avg_quality_score=4.3 → bonus = (4.3-3.5)*0.10 = +0.08
  quality_bonus_range: 0.10

  # 完成率附加分系数
  # 例: avg_completion_rate=0.98 → bonus = (0.98-0.9)*0.30 = +0.024
  completion_bonus_range: 0.30

# ─── 路由阈值 ────────────────────────────────────────────────────────────────
thresholds:
  # 最低综合得分阈值（低于此分直接淘汰）
  min_score: 0.30

  # 最低平均质量评分（硬性门槛）
  min_quality_score: 3.0

  # 最低平均完成率（硬性门槛）
  min_completion_rate: 0.80

  # 默认返回候选数量
  default_top_k: 3

# ─── 技能等级定义 ─────────────────────────────────────────────────────────
# 用于 human-readable 说明，不影响算法逻辑
skill_definitions:
  1: "基础了解 — 能辅助简单操作"
  2: "初级应用 — 能独立完成常规任务"
  3: "熟练掌握 — 能处理中等复杂度问题"
  4: "专业精通 — 能独立负责专业领域"
  5: "顶级专家 — 能设计体系、引领方向"

# ─── 路由策略预设 ──────────────────────────────────────────────────────────
routing_presets:
  # S级快速任务：放宽门槛，快速路由
  fast:
    min_score: 0.10
    default_top_k: 1

  # M级标准任务：默认配置
  standard:
    min_score: 0.30
    default_top_k: 3

  # L级重大任务：严格筛选
  strict:
    min_score: 0.50
    default_top_k: 5

  # QA严选：质量优先，宁缺毋滥
  qa_focused:
    min_score: 0.60
    default_top_k: 1
    min_quality_score: 4.0
    min_completion_rate: 0.95
