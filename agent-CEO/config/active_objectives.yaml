# 使用指南
usage_notes: |
  新 Objective 注册流程：
  1. 总裁在对话中明确批准某个 WBS / Roadmap / 大型方案
  2. Lysander 立即派单 synapse_product_owner 将其注册入本文件
  3. Objective 生效后，Lysander 跨会话持有该目标

  Objective 完成流程：
  1. 所有 milestones 均为 completed
  2. Lysander 派单 synapse_product_owner 将 Objective 迁移到 completed_objectives
  3. 向总裁做最终终结汇报

  新会话 resume 流程：
  1. Lysander 主对话启动时 Read 本文件
  2. 检查有无 in_progress 目标
  3. 若用户新诉求在某 Objective 范围内 → 按 authorization_scope 自主推进
  4. 若为全新诉求 → 走完整【0.5】承接流程
