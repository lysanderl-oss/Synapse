    # 战略动机
    motivation: |
      博客管线当前 100% 锁本机：
      - Layer 1 触发：Windows Task Scheduler 仅本机开机时跑
      - Layer 2 抽取：本机 Python 脚本扫 .claude/projects/
      - Layer 3 发布：本机 git push
      关机即停。需复制情报管线（GitHub Actions cron）模式实现云端化。

    # 方案 A 核心架构
    architecture: |
      Stage 1：上传层（本机轻量 watcher）
        本机 .claude/projects/*.jsonl
        → 文件监听 + 增量同步
        → 私有 GitHub repo: synapse-sessions

      Stage 2：处理层（GitHub Actions cron）
        synapse-sessions checkout
        → session-to-worklog（云端）
        → auto-publish-blog（云端 + QA）
        → 写入 lysander-bond + git push
        → WF-09 Slack 通知

    # 授权范围
    authorization_scope: |
      Lysander 自主推进 4 阶段（含问题修复决策）：
      - Stage 1：基础设施 + watcher
      - Stage 2：GitHub Actions workflow + 脚本云端化改造
      - Stage 3：cron 启用 + 心跳监控 + 旧 Task 关停
      - Stage 4：双账号扩展 + 收尾归档

      过程中问题由 Lysander 审批。
      仅 4 种情况中断：真阻塞 / 超授权 / 偏离>30% / L4。

