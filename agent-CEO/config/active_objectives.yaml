# Synapse Active Objectives — 目标层状态文件
# 用途：跨会话持有总裁已授权的"目标 + 授权范围"，避免每次对话重新请示
# 读取时机：每次会话启动时，Lysander 必须 Read 本文件
# 维护时机：
#   - 总裁批准新 Objective 时追加
#   - 里程碑完成时更新 current_milestone / next_milestone / last_progress_at
#   - Objective 完成时 status: in_progress → completed
# 与 active_tasks.yaml 的区别：
#   - active_tasks.yaml 是"任务清单"（颗粒：单任务）
#   - active_objectives.yaml 是"目标清单"（颗粒：总裁级目标，含授权范围）

version: "1.1.0"
last_updated: "2026-04-26"

# D2 全自动 INTEL 消化规则（总裁 2026-04-26 批准）
# 配合 CLAUDE.md 【0.5】②.5 步使用
# Lysander 在每次会话 resume 时自动消化 pending-dispatch INTEL

dispatch_rules:
  enabled: true
  source: "OBJ-INTEL-LOOP-CLOSURE D2 升级"
  approved_by: 总裁刘子杨
  approved_at: "2026-04-26"

  # 规则按顺序匹配，第一条命中即生效
  rules:
    - name: "P0 立即派单"
      conditions:
        priority: P0
        rice_score_min: 18
      action: dispatch_immediately
      target_team: harness_ops
      notes: "Lysander 主对话立即调 Agent 工具创建子 Agent 执行"

    - name: "P1 高分升级 REQ"
      conditions:
        priority: P1
        rice_score_min: 15
      action: upgrade_to_req
      target_pool: requirements_pool.yaml
      target_status: approved
      notes: "自动入需求池等 Q2/Q3 排期"

    - name: "P2 中分入池低优先"
      conditions:
        priority: P2
        rice_score_min: 10
      action: upgrade_to_req
      target_status: approved
      target_priority: P2
      notes: "Q3 或之后排期"

    - name: "P3 / 低分自动延期"
      conditions:
        priority: P3
      action: mark_deferred
      target_status: deferred
      notes: "记录但不处理"

    - name: "未匹配规则保留待人工"
      conditions:
        default_fallback: true
      action: keep_pending
      notes: "Lysander 在汇报中明确列出"

  safeguards:
    max_auto_dispatch_per_session: 3
    max_auto_upgrade_per_session: 10
    require_lysander_summary: true
    revert_on_error: true

  override_keywords:
    - "暂停自动消化"
    - "全部留待审查"
    - "今天先不要 review INTEL"

  # 已处理统计（每次自动消化后追加，便于总裁审计）
  history: []

