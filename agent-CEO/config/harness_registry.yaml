  qa:
    auto_review:
      function: qa_auto_review
      source: hr_base.py
      scale: 0-100
      threshold: 85
      dimensions:
      - name: integrity
        weight: 20
        description: 完整性 — 所有约定交付物是否齐全
      - name: accuracy
        weight: 20
        description: 准确性 — 内容/代码/配置是否无错误
      - name: consistency
        weight: 20
        description: 一致性 — 与现有系统/规范无冲突
      - name: maintainability
        weight: 20
        description: 可维护性 — 有注释、结构清晰、可升级
      - name: compliance
        weight: 20
        description: 合规性 — 符合执行链规则和HR规范（重点检查派单记录）
      gates:
        pass: score >= 85
        conditional_pass: 70 <= score < 85（记录缺口，2个会话内修复）
        fail: 50 <= score < 70（退回修订）
        critical_fail: score < 50（阻止交付，上报Lysander）
    agent_audit:
      function: audit_agent_card / audit_all_agents
      source: hr_base.py
      scale: 0-100
      threshold: 90
      schedule: 每周一自动运行
      gates:
        excellent: score >= 90 — 优秀，保持 active
        pass: 85 <= score < 90 — 合格，通过门禁
        improve: 80 <= score < 85 — 需优化，限期提升能力描述至A级
        fail: 60 <= score < 80 — 不合格，立即修订
        critical: score < 60 — 严重不合格，降级 inactive 或退役
      capability_grades:
        A: 含工具/框架名+具体产出物（目标水平）
        B: 方法论/框架应用（合格线）
        C: 仅活动名如'项目管理'（不合格，禁止出现）
    execution_chain_audit:
      checks:
      - 是否有团队派单记录
      - 执行链各环节是否完整
      - 执行者身份声明是否存在
      - QA审查是否执行
      executor: execution_auditor
  fsm:
    version: 1.0.0
    file: agent-CEO/harness_fsm.py
    states_file: agent-CEO/config/fsm_states.yaml
    states_count: 11
    transition_rules_count: 19
    terminal_states:
    - completed
    - partially_completed
    - cancelled
    blocked_states:
    - blocked
    - escalated
    audit:
      p0_rules:
      - id: FSM-P0-001
        name: COMPLETED 必须从 QA_REVIEW
        check: to_state=='completed' implies from_state=='qa_review'
        violation_action: 阻止转换，记录到 ceo-guard-audit.log
      - id: FSM-P0-002
        name: DISPATCHED 前必须是 IDLE
        check: to_state=='dispatched' implies from_state in ('idle', '')
        violation_action: 阻止转换
      - id: FSM-P0-003
        name: Visual QA 截图验证
        check: UI变更 implies visual_qa_screenshot_attached==true
        violation_action: 阻止 COMPLETED，要求补充截图
      p1_rules:
      - id: FSM-P1-001
        name: BLOCKED 超过 24h 必须 ESCALATED
        check: blocked_hours>=24 implies to_state=='escalated'
        violation_action: 自动升级，通知 Lysander
        auto_trigger: true
      - id: FSM-P1-002
        name: 终态不可逆向流转
        check: from_state in terminal_states implies to_state in terminal_states
        violation_action: 警告，需要 Lysander 明确决策
      p2_rules:
      - id: FSM-P2-001
        name: ESCALATED 后 Lysander 必须介入
        check: from_state=='escalated' implies Lysander_decision_recorded==true
        violation_action: 记录到决策日志
    integration:
      handoff_protocol:
        status_field: result_receipt.status
        history_field: result_receipt.outcome.state_history
      active_tasks:
        file: agent-CEO/config/active_tasks.yaml
        fsm_field: execution_state
        persist_on_session_end: true
        restore_on_session_start: true
      task_tracker_file: agent-CEO/config/active_tasks_fsm.yaml
    valid_transitions:
      idle:
      - dispatched
      dispatched:
      - acknowledged
      - blocked
      - cancelled
      acknowledged:
      - in_progress
      - blocked
      - cancelled
      in_progress:
      - qa_review
      - blocked
      - escalated
      - cancelled
      qa_review:
      - completed
      - partially_completed
      - rejected
      rejected:
      - in_progress
      - cancelled
      blocked:
      - in_progress
      - escalated
      - cancelled
      escalated:
      - in_progress
      - cancelled
      completed: []
      partially_completed: []
      cancelled: []
