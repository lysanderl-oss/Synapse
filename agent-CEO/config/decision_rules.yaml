# ============================================================================
# QA 评分阈值（v3.0 统一标准）
# ============================================================================
qa_thresholds:
  pass: 85          # >= 85/100: 交付
  conditional: 70   # 70-84/100: 有条件通过，记录缺口，2个会话内修复
  fail: 50          # 50-69/100: 退回修订
  critical_fail: 0  # < 50/100: 严重不合格，上报Lysander，阻止交付

qa_dimensions:
  integrity:
    name: "完整性"
    max_score: 20
    description: "所有约定交付物齐全"
  accuracy:
    name: "准确性"
    max_score: 20
    description: "内容/代码/配置无错误"
  consistency:
    name: "一致性"
    max_score: 20
    description: "与现有系统/规范无冲突"
  maintainability:
    name: "可维护性"
    max_score: 20
    description: "有注释、结构清晰、可升级"
  compliance:
    name: "合规性"
    max_score: 20
    description: "符合执行链规则和HR规范"

# ============================================================================
# 知识库配置
# ============================================================================
knowledge_base:
  decision_history_dir: "${DECISION_LOGS_DIR:-./logs/decisions}"
  discussion_history_dir: "${DISCUSSION_LOGS_DIR:-./logs/phase2}"
  max_similar_cases: 3
  similarity_threshold: 0.7
  obs_knowledge_base:
    root: "${OBS_KB_ROOT:-../obs}"
    structures:
      - "01-team-knowledge"
      - "02-project-knowledge"
      - "03-process-knowledge"
      - "04-decision-knowledge"
      - "05-industry-knowledge"

# ============================================================================
# 权限配置（v3.0 — 最小化总裁参与）
# ============================================================================
permissions:
  auto_approve:  # L1
    - "专家方案审核"
    - "任务分配"
    - "标准流程执行"
    - "内部协调"
    - "信息查询"

  expert_review:  # L2
    - "新方案首次执行"
    - "跨团队协调"
    - "风险可控变更"
    - "团队扩编"

  lysander_decide:  # L3
    - "重大方案设计"
    - "高风险技术变更"
    - "战略方向调整"
    - "组织架构调整"
    - "新领域进入"

  president_only:  # L4
    - "外部合同签署"
    - "预算 > 100万"
    - "公司存续级决策"
    - "总裁指定汇报事项"
