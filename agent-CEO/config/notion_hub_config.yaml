credentials:
  # All credentials stored as Windows User Environment Variables
  # Never hardcoded in scripts
  env_vars:
    - NOTION_TOKEN       # Notion integration token
    - NOTION_DB_ID       # Lysander-AI work log database ID
    - ANTHROPIC_API_KEY  # For AI-generated daily summaries

sync:
  schedule: "22:00 Dubai (UTC 18:00)"  # 工作日志日同步
  weekly_hub_sync: "20:00 Dubai Sunday (UTC 16:00)"  # Hub 周度全同步
  task_name: "Synapse-NotionDailySync"
  task_state: "Ready"
  enabled: true
  weekly_workflow: ".github/workflows/hub-weekly-sync.yml"
  fallback_buffer: "logs/notion-sync-buffer.json"
  scripts:
    collector: "scripts/claude_code_collector.py"
    daily_sync: "scripts/notion_daily_sync.py"
    codex_append: "scripts/codex_log_append.py"
    diff_to_notion: "scripts/diff-to-notion.py"     # 新增
    hub_health_check: "scripts/hub-health-check.py"  # 新增

sources:
  claude_code:
    auto: true
    data_sources:
      - "git log (Dubai TZ, --since/--before)"
      - "agent-CEO/data/intercept_log.yaml"
    sync_trigger: "daily at 22:00 Dubai via Task Scheduler"
  codex:
    auto: true  # reads logs/codex-daily.md
    append_script: "scripts/codex_log_append.py"
    log_file: "logs/codex-daily.md"
    append_usage: "py -3 scripts/codex_log_append.py \"task\" \"output\" \"done\""
  trae:
    auto: false  # manual update only
    template: "Use Notion page: Trae Promotion Station"
    page_id: "34d114fc-090c-81cc-9ae5-f86cb150da31"

database_schema:
  fields:
    - Name: title
    - Date: date
    - Source: select  # Claude Code | Codex | Trae
    - Level: select   # daily | weekly | milestone | strategic_insight
    - Summary: rich_text
    - KeyOutcomes: rich_text
    - KeyDecisions: rich_text
    - NextSteps: rich_text
    - CommitCount: number
    - SyncStatus: select  # auto | manual | retry

